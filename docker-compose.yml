name: Deploy AI Resume Builder

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # Build Backend
      - name: Build Backend Image
        run: |
          docker build -t ai-builder-backend ./Backend
          docker tag ai-builder-backend:latest 351405419223.dkr.ecr.ap-south-1.amazonaws.com/ai-builder-backend:latest

      # Build Frontend
      - name: Build Frontend Image
        run: |
          docker build -t ai-builder-frontend ./Frontend
          docker tag ai-builder-frontend:latest 351405419223.dkr.ecr.ap-south-1.amazonaws.com/ai-builder-frontend:latest

      - name: Push Backend Image
        run: |
          docker push 351405419223.dkr.ecr.ap-south-1.amazonaws.com/ai-builder-backend:latest

      - name: Push Frontend Image
        run: |
          docker push 351405419223.dkr.ecr.ap-south-1.amazonaws.com/ai-builder-frontend:latest

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |

            aws ecr get-login-password --region ap-south-1 | \
            docker login --username AWS --password-stdin 351405419223.dkr.ecr.ap-south-1.amazonaws.com

            docker network inspect app-network >/dev/null 2>&1 || docker network create app-network

            docker pull 351405419223.dkr.ecr.ap-south-1.amazonaws.com/ai-builder-backend:latest
            docker pull 351405419223.dkr.ecr.ap-south-1.amazonaws.com/ai-builder-frontend:latest

            docker rm -f backend frontend mongo xabhi02 || true

            docker run -d \
              --name mongo \
              --network app-network \
              -p 27017:27017 \
              mongo

            docker run -d \
              --name backend \
              --network app-network \
              -p 5000:5000 \
              --restart unless-stopped \
              --env-file /home/ubuntu/.env \
              351405419223.dkr.ecr.ap-south-1.amazonaws.com/ai-builder-backend:latest

            docker run -d \
              --name frontend \
              --network app-network \
              -p 80:80 \
              --restart unless-stopped \
              351405419223.dkr.ecr.ap-south-1.amazonaws.com/ai-builder-frontend:latest