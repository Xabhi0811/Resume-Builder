name: Deploy AI Builder

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Backend Image
        run: docker build -t xabhi/aibuilder2-backend:latest ./Backend

      - name: Push Backend Image
        run: docker push xabhi/aibuilder2-backend:latest

      - name: Build Frontend Image
        run: docker build -t xabhi/aibuilder2-frontend:latest ./Frontend

      - name: Push Frontend Image
        run: docker push xabhi/aibuilder2-frontend:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}

            docker pull xabhi/aibuilder2-backend:latest
            docker pull xabhi/aibuilder2-frontend:latest

            docker rm -f aibuilder2-backend aibuilder2-frontend || true

            docker run -d \
              --name aibuilder2-backend \
              --restart unless-stopped \
              --env-file /home/ubuntu/.env \
              -p 5000:5000 \
              xabhi/aibuilder2-backend:latest

            docker run -d \
              --name aibuilder2-frontend \
              --restart unless-stopped \
              -p 8080:80 \
              xabhi/aibuilder2-frontend:latest

            docker image prune -af