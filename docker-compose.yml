- name: Deploy via SSH
  uses: appleboy/ssh-action@v1.0.3
  with:
    host: ${{ secrets.EC2_HOST }}
    username: ${{ secrets.EC2_USER }}
    key: ${{ secrets.EC2_SSH_KEY }}

    script: |
      aws ecr get-login-password --region ap-south-1 | \
      docker login --username AWS --password-stdin 351405419223.dkr.ecr.ap-south-1.amazonaws.com

      docker system prune -af --volumes

      docker pull 351405419223.dkr.ecr.ap-south-1.amazonaws.com/ai-builder-backend:latest
      docker pull 351405419223.dkr.ecr.ap-south-1.amazonaws.com/ai-builder-frontend:latest

      docker pull mongo:latest

      docker network inspect app-network >/dev/null 2>&1 || docker network create app-network

      docker rm -f backend frontend mongo || true

      docker run -d \
        --name mongo \
        --network app-network \
        mongo

      docker run -d \
        --name backend \
        --network app-network \
        -p 5000:5000 \
        --restart unless-stopped \
        --env-file /home/ubuntu/.env \
        351405419223.dkr.ecr.ap-south-1.amazonaws.com/ai-builder-backend:latest

      docker run -d \
        --name frontend \
        --network app-network \
        -p 3000:80 \
        --restart unless-stopped \
        351405419223.dkr.ecr.ap-south-1.amazonaws.com/ai-builder-frontend:latest